<svg xmlns="http://www.w3.org/2000/svg" width="900" height="130" viewBox="0 0 900 130" role="img" aria-labelledby="title description">
  <title id="title">LPS-B Auswertung</title>
  <desc id="description">Eingabefeld für die manuelle Punktzahl der Spalte 6 mit Speichern-Schaltfläche.</desc>
  <rect x="0.5" y="0.5" width="899" height="129" fill="#ffffff" stroke="#d1d5db"/>
  <text x="24" y="39" fill="#202124" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">LPS-B Auswertung</text>
  <text x="24" y="91" fill="#737373" font-family="Arial, Helvetica, sans-serif" font-size="17">Spalte 6 (manuell)</text>
  <rect x="184" y="62" width="122" height="42" rx="8" fill="#ffffff" stroke="#d4d4d8"/>
  <rect x="322" y="62" width="116" height="42" rx="8" fill="#202124"/>
  <text x="380" y="89" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Speichern</text>
  <text x="458" y="89" fill="#737373" font-family="Arial, Helvetica, sans-serif" font-size="15">Tragen Sie den Wert aus der Ergebnisansicht für Spalte 6 ein.</text>
</svg>
